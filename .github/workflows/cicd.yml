name: CI-CD-PIPELINE

on:
  push:
    branches:
      - main

jobs:
  CORE-SERVICE-DEPLOYMENT:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: services/core-service
        run: npm install

      - name: Build NestJS
        working-directory: services/core-service
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.CORE_SERVICE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_CORE_APP_PUBLISH_PROFILE }}
          package: services/core-service

  UI-SERVICE-DEPLOYMENT:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: services/ui-service
        run: npm install

      - name: Build Next.js
        working-directory: services/ui-service
        env:
          NEXT_PUBLIC_PLATFORM_NAME: ${{ secrets.NEXT_PUBLIC_PLATFORM_NAME }}
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.UI_SERVICE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_UI_APP_PUBLISH_PROFILE }}
          package: services/ui-service
