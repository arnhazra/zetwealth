name: Daily Cashflow Execution

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  execute-cashflow:
    runs-on: ubuntu-latest

    steps:
      - name: Call Cashflow API with retry
        run: |
          for i in {1..10}; do
            echo "Attempt $i..."

            response=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST ${{ secrets.CORE_SERVICE_URL }}/apps/cashflow/execute)

            if [[ "$response" == "200" || "$response" == "201" || "$response" == "202" ]]; then
              echo "Cashflow execution succeeded with status $response"
              exit 0
            fi

            echo "Failed with status $response"
            sleep 30
          done

          echo "All retries failed"
          exit 1
