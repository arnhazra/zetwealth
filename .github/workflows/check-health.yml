name: Check Service Health

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check-health:
    runs-on: ubuntu-latest

    steps:
      - name: Check Core Service Health
        run: |
          for attempt in {1..3}; do
            response=$(curl -s -o /tmp/core-health.json -w "%{http_code}" \
              ${{ secrets.CORE_SERVICE_URL }}/health)

            cat /tmp/core-health.json

            if [[ "$response" == "200" ]]; then
              echo "Core service health check succeeded on attempt $attempt"
              exit 0
            fi

            echo "Core service health check failed with status $response on attempt $attempt"

            if [[ "$attempt" -lt 3 ]]; then
              sleep 10
            fi
          done

          exit 1

      - name: Check UI Service Health
        run: |
          for attempt in {1..3}; do
            response=$(curl -s -o /tmp/ui-health.json -w "%{http_code}" \
              ${{ secrets.UI_SERVICE_URL }}/api/health)

            cat /tmp/ui-health.json

            if [[ "$response" == "200" ]]; then
              echo "UI service health check succeeded on attempt $attempt"
              exit 0
            fi

            echo "UI service health check failed with status $response on attempt $attempt"

            if [[ "$attempt" -lt 3 ]]; then
              sleep 10
            fi
          done

          exit 1
